body:
  text: 西天譯經三藏寶輪大師賜紫沙門臣金揔持等奉詔譯爾時有十八酤胝無知外道來詣所各坐一面而作是言喬答世間最為尊勝亦勝於汝何獨號世尊世尊告言如來常勝汝何勝邪彼諸外道又復説言我等勝汝世尊告言無知外道汝何有勝但生𠑘倒住𠑘倒中云何能勝汝等於自若身若心諸苦逼迫尚不了知云何能勝汝今諦聽當為汝説諸佛甚深法義令汝等輩皆獲利益時諸外道聞佛是説生大嗔恚是時帝釋天主見諸外道心生嗔恚持堅固杵而欲摧壞諸外道輩時彼十八酤胝無知外道生大驚怖涕淚悲泣哀如來而求救護于時如來忽於隱身不現時諸外道不見如來益加憂惱涕淚悲泣同説偈言失彼救護者如失於父母亦如空寂處無伴侶獨行江河或枯竭魚鱉莫潛形若無林木枝飛鳥何所寄不見於如來我等亦如是衆生諸苦惱何人能救護爾時十八酤胝無知外道説是偈已從座而起雙膝長跪發大音得聞而作是言如來大悲兩足尊者憐憫我等願為救護作是説已爾時世尊於此衆會還復現形止帝釋天主已告一切勇猛菩薩摩訶薩言汝可為彼諸外道輩宣説妙法正時一切勇猛菩薩而白佛言世如須彌山王以小黑山豈能為比今者如來令我為是諸外道等宣説諸法亦復如是世尊告言善男子汝可觀察十方世界諸佛如來方便善巧所作利益皆是如來智慧願力之所建立此諸外道樂我説法汝先往詣十方世界觀察諸佛如來説法方便是外道輩我當為説一切勇猛復白佛言今者世尊令我往詣十方世界觀察諸佛説法方便未審以何神通力去以自神通為承佛力而告言一切勇猛以汝神通及假如來神力而去爾時一切勇猛菩薩即從座起繞佛三匝作禮而去爾時世尊告諸外道我今法要汝等當知生為大因有招諸怖畏所謂生有病怖生有老怖生有死怖何緣名怖為諸衆苦所逼惱時生大怖畏所謂王法加怖怨賊會怖風火水等飄焚沈溺如是等造諸惡業苦報熟時生大憂諸苦當知皆是因生而有世尊告言諸外道等若能了知如是生法當得離於一切諸苦時彼外道聞佛是説生大怖畏咸白佛言我等今者皆願離於生死怖畏是時世尊時彼十八酤胝無知外道皆發阿耨多羅三藐三菩提心復有萬八千酤胝菩薩皆得十地以神通力現種種形及諸神變現神變已咸皆升於世尊四面諸寶樹下蓮華座上跏趺而坐爾時如來入于三昧以善巧方便舒金色臂示説法相經七晝夜是時一切勇猛菩薩遊於十方諸佛剎土最後至彼最上語言蓮華世界從於彼土屈伸臂頃還來至世尊所繞佛三匝生尊重心恭敬合掌而白佛言我承佛教往詣十方諸佛剎土以自神通過九十九千酤胝諸佛剎土以如來神力過百千酤胝諸佛剎經七晝夜最後至於最上語言蓮華世界於其中間過九十二千酤胝佛剎見彼諸佛現在説法又過八十千酤胝佛剎見彼八十千諸佛如來應正等正覺同時出世我皆於彼恭敬作禮又過三十九千酤胝佛十九千酤胝菩薩以正法藏咨詢議同時皆證無上菩提我亦於是初成正覺諸如來所各各恭敬作禮旋繞又過六十酤胝諸佛剎土見諸尊安住説法我亦於是諸如敬禮拜又過百酤胝佛剎見彼如來將般涅盤我亦如是於彼佛所恭敬作禮又過九十五酤胝佛剎見彼正法將欲破壞心自思惟生大悲惱彼欲界色界天龍藥叉等各各憂惱涕淚悲泣又過一佛剎正法久滅火洞然大海須彌土地草木悉皆燒壤但一空界無所依止過是界已至于最上語言蓮華世界見彼虛空中各有百千酤胝諸佛世尊各坐於七寶之座為諸衆生宣説妙法我到彼已問諸如來今此世界名字云何時諸佛中有一世尊而告我言此佛世界號最上語言蓮華我於彼是世尊所右繞作禮而白彼佛今此剎土化衆生主其名云何彼世尊言名蓮華藏如來應供正等正覺我時於彼諸佛世尊所而皆作禮乃告之言今此五百千酤胝諸佛衆中何者名蓮華藏如來時彼最上語言蓮華世界諸如來中一佛世尊乃告我言善男子我是蓮華藏如來應正等正覺作是説已時如來隱身不現同時化現菩薩形相于時唯見如來身我於是時頭面敬禮彼如足忽於地中涌出寶座時彼世尊示我令坐我升座已又復涌出無數寶座而無有人升是座者我時問言云何如是衆多寶座空無人坐時彼尊乃告我言諸有情類不種善根藏福德故尚不能見如是寶座况復能得登是座邪我復白彼佛世尊言種何善根而得是座彼世尊言善男子若諸有情得聞是僧伽吒法義者是諸有情能登是座暫聞尚爾何况有人於此法義書寫讀誦修習之切勇猛汝於過去由聞是法生心今乃得至我土中我時又問世尊言其有聞此僧伽吒法義所得福德其數幾何彼時蓮華藏如來放大光明現希有相其光遍照十方世界我復白彼佛言有何因緣放大明現希有相彼佛告言一切勇猛昔已聞釋迦如來説是功德我今為汝亦復略説一切勇猛譬如所王一四大洲地滿中盛巨勝云何如是巨勝是為多不一切勇猛而白佛言甚多世尊佛言一切勇猛以是巨勝共為一聚若人取以為種種於餘處如是一聚成無量算師還能算計知其數復白佛言不也世尊無有衆生算計知其數者彼世尊言此僧伽吒法義聽聞之者所得功德亦復如是算數計量所不能及一切勇猛乃以一巨勝為一如來同共聲讚聞是僧伽吒法義所得善根無量福德不能窮盡于時一切勇猛菩薩而復告白尊言若復有人書寫受持讀誦如是法義所獲功德願為略説其數云何時彼世尊而語一切勇猛言善男子諦聽諦聽吾今為汝解説善男子三千大千中草木叢林根莖枝葉悉皆斷截如指節量以一節量為一輪王又復以三千大千世界所碎為微塵復以一塵為一輪天下是諸輪王所有福德若有衆善能算計知其數否一切勇猛菩而白佛言世尊如上所説彼所有福德其數無量而無有籌量知其數量言如是如是勇猛菩薩若復有人於此僧伽吒大乘最勝法義而能書寫受持説所獲福德若以三千大千世界國土滿中草木叢根莖枝葉悉知所截如指節量以一節量為一輪又復以其三千大千國土滿中所有土石末為微塵以一微塵為一輪一所有福德不可為喻若復有人而能尊重是僧伽吒大乘法義一字一義是人所得福德倍勝於前一切勇猛菩薩若人於此僧伽吒經一心正念堅固受持安住法中如是之人是名獲得最上廣大勝法一切寶藏常得現前出生無量功德義利饒益衆生為大法炬光明一切有情自他種種煩惱悉皆摧伏天魔蘊魔煩惱死魔及魔眷屬皆悉破壞一門若性若相若方便智慧悉皆能入一摩訶白彼世尊言若人於是僧伽吒法義習之者是名成就諸真實行名行如是淨行名如來行如是之人甚為希有彼淨人於晝夜中來常現在前而為覆護得見如來亦復能入如來剎土一切藏而能悟如是之人臨諸怖倒散亂安住正而於後世不處胎胞清淨化生遠離衆苦及諸煩惱切愛染不為怨家男女眷屬種纏縛我時白世尊已時彼世尊復語我言一切勇猛菩薩摩訶薩如來出世如優曇華難可值遇又復僧伽吒最上法亦復為難而福中深生信解歡喜聞持不生誹諦中復為難一切勇猛菩薩摩訶薩若聞此僧伽吒法義即能慧於八十劫中宿命智六十為轉輪王八千劫中為天帝釋二墮五千劫中為淨居天三萬八千劫中為大梵王四空天主九千劫不壞正信至來五百劫中不摖囉迦趣百千劫中不墮餓鬼二萬八千劫中不墮畜生萬三千劫中不墮修羅遠離鬥諍刀杖損害二萬千劫中離七千劫中常修善慧九千劫中廣修檀度一切衆生若有所須悉皆能捨心無慳惜具足猶如如來萬千劫不墮女身萬六千劫離諸苦因緣二萬五千劫中得利萬九千劫中不墮龍身六十劫中不生嗔恚七十劫中所須充足離諸貧苦八萬劫中為銅輪王王二天下救護一切生令得安樂萬酤胝劫中遠離愚癡萬三千劫離諸諂誑及以惡行萬一千劫常行忍辱乃至臨命終時離諸苦惱心不動搖不生𠑘倒正念現前不起嗔恚得見東方十二殑伽沙數諸佛世尊南方十二酤胝諸佛世尊西方二十五殑伽沙數諸佛世尊北方八十殑伽沙數諸佛世尊上方九十九千酤胝諸佛世尊下方百酤胝殑伽沙數諸佛世尊如是等諸佛如來悉皆現前而為守護咸作是言善男子勿生怖畏汝昔已曾種於最上功德善根是故我等殑伽沙數百千酤胝你𢈔多如來常現在前觀察護念善男子汝見如是諸如來否時彼白言我今得見如是世尊而我以何善業因緣而得如是一切如來而來守護世尊告言善男子由汝曾聞僧伽吒法義以是功德我等諸佛皆來守護而作是言世尊唯我一人得聞是經功德如是況復盡令一切衆生得聞是經所獲功德時彼世尊廣以譬喻宣説衆生聞此經者臨命終時及以未來所獲無量勝功德已復語我言若有一切善男子善女人尊重供養十三殑伽沙數諸佛世尊所得功德其數甚多不如有人聞此僧伽吒法義一四句偈所得功德復過於彼我時復白是世尊言若復有人具足聽聞是經典者所得功德其數云何善男子諦聽諦聽若人於此僧伽吒法義具足聽聞譬如三千大千世界滿中巨勝以一巨勝一輪王若復有人以諸珍寶種種庫藏布施供養如是輪王所得福德不如布施供養一須陀洹若有人布施供養三千大千世界須陀洹人福德不如布施供養一斯陀含若人布施三千大千世界斯陀含人所得福德不如布施供養一阿那含人若復布施供養三千大千世界阿那含人所得福德不如布施供養一阿羅漢若復有人布施供養三千大千世界阿羅漢所得福德不如布施供養一辟支迦若復有人布施供養三千大千世界辟支迦所得福德不如布施供養一菩薩人若復有人布施供養三千大千世界菩薩所得福德不如於一如來所生淨信心布施供養若復有人於三千大千世界諸如來所生淨信心布施供養所得福德其數甚多不如有人於此僧伽吒法義具足聽聞所得福德一切勇猛何況有人於是法義書寫演説受持讀誦解其義理廣宣流布一切勇猛汝今但當於僧伽吒最上法義生淨信心廣宣流布所得功德不可思議於意云何彼諸凡夫愚癡之人雖聞是經不生淨信不能解了一切勇猛譬如有人入於大海欲能盡知海水邊際汝謂是人而能知否一切勇猛而白佛言是人雖復入於大海而不能知海水邊際一切勇猛又復譬如有人臨於大海以手掬水而次枯涸汝謂是水得枯涸否一切勇猛而白佛言善逝世尊如是之人徒自疲勞而無能得海水枯涸一切勇猛彼諸凡夫無智之者若聞是法𠑘倒疑惑不生淨信欲於深廣生死大海到其邊際及以枯涸無有是處一切勇猛如是之人雖經八十酤胝殑伽沙數諸佛世尊出現於世無有善根不能得見如來色相不能得聞如是法義乃至值遇九十酤胝殑伽沙數諸佛世尊百千酤胝那𢈔多數諸佛如來出興於世宿無善根不能得見諸如來不能得聞如是法義不為諸佛之所護念一切勇猛若有智者宿植善根而得值遇百千酤胝諸佛世尊於諸佛所發淨信心得聞如是僧伽吒法而生信解如是之人即為諸佛之所護念一切勇猛若人此僧伽吒法而能書寫一四句偈如是之人於此報盡當過此九十五千酤胝佛土有一世界名曰安樂往生彼國壽命長遠八萬四千年歲劫數安隱快樂一切勇猛菩薩摩訶薩若復有人造五逆罪一切不善自作教他見作隨喜如是之人若得聞此僧伽吒法上四句偈所皆得消淨餘福智千酤胝衆生皆悉來集一一衆生各舒百臂以種種香所謂末香塗香散如來前藥王軍白言世尊我今已見善逝我今已見如此勝事甚為稀有佛告藥王軍此諸衆生無知無覺如幻如夢無有分別汝復諦觀時百千酤胝衆生於須間所有百臂悉皆殞滅不現藥王軍見是事已心大驚疑白佛言世尊如是衆生所有百臂於剎那間皆悉殞滅不存一二唯願世尊為我宣説佛告藥王軍此諸衆生無知無覺如幻如夢亦不分別有生滅相藥王軍我觀佛身與衆生等汝於是義當善了知藥王軍菩薩白佛言世尊云何是老衆生佛告藥王軍無有知覺常處熱惱不久破壞是老衆生復告藥王軍是諸熱惱衆生汝欲見不白佛言世尊我願欲見爾時月輪種如來即舒右臂垂其指掌于時四方百酤胝人俱來集會上方下方各五十酤胝衆生悉來同集是諸衆生禮雙足已於如來前無言無説默然而住佛無教誨爾時藥王軍菩薩白佛言世尊此諸衆生於剎那頃從何而來至世尊前云何無言無説默然而住佛無教誨佛告藥王軍汝還知不大地之性本無言説亦不住立法聚之中本無知覺若解此義與藥王軍同一名號等無有異藥王軍如是老衆生不知有生不知有滅亦不知有老病𮕱苦憂悲煩惱亦不憎愛亦不輕毀亦不於諸眷屬生於愛戀亦不於法而生懈倦無覺無知無所造修是故各各默然而住爾時藥王軍菩薩復白佛言世尊此諸逼惱衆生何因而生何緣而至不了諸法默然而住佛告藥王軍諦聽諦聽此諸逼惱衆生非因鍛鑿金銀所成亦非爐冶埏埴所得亦非刻木鐫石為之唯是男女和合相應所生若或金銀銅鐵木石所成人或愛護尚可久存既唯父母生之復因先業造受不同修短有異而於世法亦不知有工巧技術甘辛苦樂況今豈能生敬信心能問能聽此諸衆生不久滅謝還受諸報久處三界逼迫故名老人藥王軍此諸衆生自作燒然無有休息譬如有人以杖撥火令火速滅前火未滅杖已煙生漸至熖起杖亦然之藥王軍如是衆生於此報中先業未滅復造後因漸漸增長後報復生隨惡流轉何能出離藥王軍諸佛如來大慈大悲愍諸衆生久處流轉不惜軀命示現利生譬如有人違犯王法為王所獲繫閉牢獄枷鎖杻械常處暗室幽暝所蔽無所見聞亦復不知東西南北出之所由心雖疲勞欲得解脫以暗暝故無由通達復有一人曾繫是獄今雖得出念昔艱苦愍此衆生設諸方便持小火種求入獄中既入獄已漸出微光令彼衆生更互相見各各歡喜作諸方便可以逃竄時彼見是事已更發火光令漸增大展轉炎熾凡在獄中若有罪若無罪悉皆逃竄唯彼暗室及彼丈夫俱為灰燼王聞是事悲感念言由我制法衆生有犯繫諸牢獄遂致菩薩亡身救濟可不痛哉尋出詔命於我國中勿復造此苦惱衆生之具勑令遍告國內人民今我國家不制法律不造囹圄有人民之事更不復作汝等人民凡厥親緣當自遞生恭敬非親庶類勿相侵惱取與以仁進退以禮崇重賢明愛護物命凡百仕庶體我志焉由是一切衆生皆得安樂藥王軍諸佛如來為利益衆生故以智慧光破無明暗出三界獄喪失身命如恆河沙數不以為難何況一身耶月輪種如來説是法時無量諸天及阿蘇囉等皆大歡喜發菩提心爾時諸天於虛空中歡喜讚嘆而説偈言大善勝福田萬德皆圓滿出世調御尊能生諸善種最勝清淨法堅固不可壞善巧方便力擁護諸衆生安住涅槃界示同諸世間勇猛常樂施隨類獲安樂天人無上師救度於一切三界諸衆生平等得濟度閉諸地獄門餓鬼畜生趣此世及他生俱獲安隱樂爾時世尊復於衆中而説偈言善哉住佛剎善哉見佛身善哉聞妙法善哉僧寶集善哉僧伽吒懺除一切罪爾時藥王軍菩薩摩訶薩聞是空中稱揚讚歎微妙法音踊躍歡喜合掌敬禮月輪種如來足白佛言世尊今聞諸天宣説如是微妙句偈稱揚讚歎甚適我願彼佛告言善男子汝今觀此會中年少衆生為諸熱惱之所燒然受如是苦藥王軍菩薩白佛言世尊我今見是年少衆生受諸苦惱唯願世尊速為除滅皆令安隱佛告藥王軍如是如是如汝所言我於今日當設方便令此年少衆生安住十地藥王軍菩薩復白佛言世尊云何如來能以大法化諸難化衆生令生信解獲諸利益佛言藥王軍善哉善哉汝能問佛如是妙義善男子汝今諦聽我觀此諸年少衆生雖為熱惱之所燒然由宿因緣成熟力故而於今日聞我説法一一皆當善根圓滿得登十地爾時藥王軍菩薩摩訶薩聞是語已心大歡喜涌身高八万瑜膳那住虛空中出無量音聲歌誦讚歎如來具大慈悲以大願智當演無上微妙大法誘接衆生令離熱惱住清涼地作是語時三千大千世界六種震動時三十三天主與無數諸天聞是音聲歡喜踊躍各將眷屬如雲來集散衆寶香及天妙花以為供養禮佛畢已住在一面復有八万四千龍王與諸龍衆亦來集會無量夜叉羅剎娑及阿蘇囉健達嚩緊捺落摩護落伽各與眷屬無量大衆皆來集會復有無量已墮諸大地獄衆生乘佛神力皆來集會十方世界百千酤胝諸大菩薩摩訶薩衆各運神通亦來集會爾時藥王軍菩薩摩訶薩從空中下曲躬合掌敬禮世尊而作是言甚盛世尊甚盛善逝今於此會有無量菩薩天龍八部并阿痆葛底王城一切鬼王乃至地獄惡趣衆生皆來集會住世尊前咸願得聞微妙法要惟願世尊廣為宣説爾時月輪種如來告藥王軍菩薩言善男子汝等諦聽我今所説微妙法蘊能除一切衆生熱惱煎熬無量衆苦此妙法蘊是真梵行是清涼法具足一切善法功德名為法蘊善男子我嘗為諸衆生説諸生苦清涼法要而諸衆生未深信解復説老苦病苦憂悲之苦冤家會苦愛別離苦心有所欲不和合苦臨命終時衆苦共集名為死苦而諸衆生曾不覺悟善男子汝今復聽我為汝等略説死苦善男子若諸衆生臨命終時有三種風內自生起初名亂識次有散識後名滅識亂識風起身心昏亂癡迷顛倒受諸苦惱漸漸增長至散識風散識風起若身若心互相離散無所安措唯有大苦相續不息生滅識風此風生時識滅身壞是名為死此風亦得名刀名針亦名砂礫何以故如刀割切如針毒刺如與砂礫和雜磨研甚大苦毒甚可怖懼汝等衆生能無怖邪爾時會中年少衆生聞佛説言識滅身壞名為死苦甚大愁惱而白佛言善哉世尊云何名身佛言善男子四大五蘊積聚名身六根完具裝嚴名身花鬘瓔珞香油所塗名身生愚癡者貪愛名身能生惡慧名身如負重簷名身增長苦縛名身如水上漚名身亦如丘冡名身善男子識滅身壞名死識起身生名生識與名色託廕母腹墮在胞胎日月滿足既已成形內有三百六十骨以筋纏絡外則覆以皮膚有八万毛竅息風出入及諸血脈通注流轉復有八万戶蟲遍布其身始自初生匝食其軀無有休息衆生識暗無所知覺將命終時是諸蟲類互相交鬥無有休息令其人身極不安隱展轉交鬥甚有死傷乃至最後唯有二蟲相鬥終于七日一蟲死已唯一蟲在最後與人同時殞滅善男子愚癡凡夫雖處世間由無明故與諸衆生日夜爭競惱物情無有休息如彼蟲類不知生老病死衆苦相催唯求己勝都無恐怖善男子往昔有一大善知識常於衆中宣説如此生老病死種種諸苦教誡教授令善修持得離苦際以諸衆生慣習頑愚未善能行如是妙行是善知識還來化利此等衆生而告之言咄善男子我常為汝分別解説諸妙法蘊生老病死種種諸苦常令汝等修行衆善棄背苦因趣求無上涅槃妙樂云何汝等不聽我言不修妙行不求解脫於閻浮提中造衆惡業流轉諸趣善男子譬如大地假使有人若以大力執持大杵撞擊之時出大音聲世間諸聲無與等者善男子汝豈不聞佛出世間以四種人為世福田生善種子廣為利益一切衆生四種人者所謂比丘比丘尼優婆塞優婆夷是四種人如世大地若能親近禮拜承事供養則能令汝獲得種種微妙善法遠離世間生老病死等苦復能證得無上涅槃清淨妙樂如以大力執持大杵撞擊大地出大音聲等無有異時善知識為諸衆生而説偈言諸佛出世間常擊大法鼓演説微妙法廣度諸衆生汝今見是事應生勇猛心滅除生死苦安住涅槃樂時諸衆生殷勤合掌向善知識即説偈言我以無智故復遇惡知識造作不善業謂貪嗔癡等常起於我見破壞和合僧廢轉妙法輪毀除佛塔寺於此勝福田曾不種少善於一切時中常作諸過失未嘗於父母暫起孝敬心出非法語言輕毀諸賢聖造此惡因故必當墮地獄自身受苦惱無能救護者可畏衆合獄炎熱大阿鼻如是諸獄中展轉受衆苦從此地獄出復入餘獄中謂刀兵蓮華黑繩沸屎等彼諸大地獄縱廣百由旬不見彼獄門唯有受苦者蹈彼刀劒鋒其苦難堪忍苦極身暫死復彼業風生生死地獄中百千酤胝劫地獄無邊際衆生亦復然以惡因緣故相續不間斷我造諸惡業當墮彼獄中唯願善知識聽説罪惡因我以貪愛心造宅甚雄壯雕鏤諸棟梁藻飾極嚴麗復置妙園林廣列臺榭等池沼花果樹一一皆圓滿庫藏積珍財莫能知算數又於間廄中廣收諸畜産象馬牛羊等其數無有量妻子及妾媵內外諸眷屬奴婢與妓人其數亦無量常令晝夜中動作衆歌舞但縱己之樂不念他人苦自恃大富貴作種種莊嚴香湯沐浴已仍以妙香塗龍腦白栴檀鬱金麝香等塗已甚香潔首戴七寶冠臂釧及指鐶皆用妙珍寶以上妙真珠貫之為瓔珞最上紫磨金嚴飾作耳璫柔軟善適意蘇摩那瞻蔔及諸異香者結以為花鬘復著美好衣謂上妙細㲲鮮白甚清潔更以妙香薰飲食最上味甘脆頗香美所供皆如意暫無飢渴時地敷好茵褥履踐以遊行左右擁從者勝彼神仙人如是廣嚴飾唯奉養其身保護謂常安不生滅壞想富樂既具足餘復無所思但恣染欲心造作不善業眼貪妙色境耳樂適恱音鼻舌身意中無不順情欲我嘗於一時復欲縱畋獵出乘大白象從以七寶馬侍衛若獰神見者皆怖懾以彈落飛鳥利箭射奔鹿猛獸若當前力士斷其命但取諸血肉令衆共噉食惡報唯自受誰是能代者一朝病緣至肢體不相隨四大或增脈息亦衰微飲食不得下寢臥不能寧良醫施妙藥功效亦唐捐父母及親友悲痛頗纏心拔髮空垂淚終無救濟術我若命終已棄在尸陀林鳥獸及諸蟲噉食稍充足形骸與神識現在悉空無唯先所造業當來受果報善法如良藥能治貪恚癡貪等既不生無因造諸惡我實無福慧虛妄受人身佛宣方便門施戒忍辱行我自不能修聞亦不隨喜障善法因緣何時當解脫唯佛大慈悲能救衆生苦戒法真實門登者獲大利如我所造業深自生追悔今對善知識是故如實説
