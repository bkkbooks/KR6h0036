body:
  text: 西天譯經三藏明因妙善普濟法師賜紫沙門臣金惣持等奉詔譯爾時月輪種如來為諸年少衆生説往昔善友化導因緣已復告藥王軍菩薩摩訶薩言藥王軍是諸苦惱衆生臨命終時以惡業故受斯苦報雖有父母妻子眷屬內外親識不能救護若無善種何由解脫爾時世尊復説偈言若作諸惡業墮大地獄中長時受極苦無有暫息時常吞熱鐵丸猛焰然其身或灌洋銅汁上下皆燋爛地獄大苦處曾無快樂時若無善方便何由得解脫常親近善友聽聞微妙法初習布施行內外一切財隨彼所應求清淨故施與堅持具足戒無令有犯他來逼惱時安忍勿施報日夜常䇿勵莫為懈怠欺觀察聖諦心湛然如止水發生慧燈明滅除諸暗冥滿足衆善法解脫見諸佛心行菩提道慈愛於世間救度諸衆生增長成佛種皆令得解脫速成無上慧爾時藥王軍菩薩摩訶薩與五百大菩薩摩訶薩衆各各運大神力從座而起涌身於虛空中現大威儀從容詳序緩步而行其心決定安固大乘遊戲三昧現諸神變或現猛虎示以威雄或現師子自在無畏或現象王有大勢力住法山頂高出羣峯無與等者身放光明極大熾盛百千酤胝日月光明不可譬喻是諸菩薩放此光明行於日月之前年少衆生見是事已白彼佛言世尊何因緣故是諸菩薩現是稀有之相放大光明行於日月之前佛言善男子汝今見是事邪年少衆生白佛言世尊唯然已見佛言善男子是諸菩薩各以自在神通之力現大光明遍照世間常説妙法化諸衆生欲令一切衆生皆得利益安樂若諸人天亦能行此妙行亦得如是神通變化及大光明能行日月之前爾時藥王軍菩薩等從空中下前詣佛所問訊世尊世尊告言藥王軍汝等見是三千大千世界六種震動不藥王軍菩薩白佛言世尊唯然已見然今我等不能了知何因何緣有此震動況今我等亦有少疑欲問世尊願佛慈悲聽我所問開示演説彼佛告言善男子汝有所疑恣汝為問或過去或現在或未來等事我當一一為汝分別解説藥王軍菩薩白佛言世尊且今此會中有八万四千天子而來集會八万四千酤胝菩薩衆亦來集會一万二千酤胝龍王亦來集會復有一万八千神王二十五千酤胝餓鬼毗舍遮等俱來集會其數甚多何因緣故而共來集欲何所作佛言善男子汝今諦聽當知此諸大衆俱來集會皆是於此樂欲聽聞佛所説法即於今日有得聞佛深妙法音正慧開覺於煩惱縛即得解脫者或有得聞如來妙唱離生老病死種種諸苦住安樂法者或有即今獲大善利出苦輪回安住十地住十地已得證如來清淨涅槃於諸苦惱永得解脫消伏魔冤證真妙覺者藥王軍菩薩復白佛言世尊大地六種震動復是何等瑞相佛告藥王軍汝今審諦觀察云何震動藥王軍菩薩復觀察已白佛言世尊我已觀察見是四方及諸方所有二十酤胝衆生忽然生於此間復有下方二十酤胝衆生從地涌出生於此間上方有二十五酤胝衆生來生此間由是大地六種震動不知此等是何瑞相佛告藥王軍且待須汝自了知于時年少衆生見是六十五酤胝衆生忽然來生此間白佛言世尊云何此中忽生如是衆生佛復告言善男子此等衆生皆是汝之徒侶來生此間年少衆生白佛言世尊此等衆生來生此間亦有死不佛告年少衆生一切衆生悉皆有死此亦有死時諸年少衆生合掌向佛頂禮佛足白言世尊我等今者更不能忍受如是生死流轉願速解脫佛告年少衆生汝等能起大精進不年少衆生白佛言世尊我等今者親覩如來金色之身得聞如來甘露妙法見諸菩薩摩訶薩等現大神通諸聲聞衆無量天人集會聽法願自精進勤修聖道不能忍受生死流轉時諸年少衆生又復繞佛三匝偏袒右肩殷勤恭敬禮世尊足重白佛言世尊我等衆生衆苦所集甚大熱惱於生死重簷極大怖畏何由解脫唯願世尊攝受我等一切衆生施令無畏得安隱住廣演妙法令諸無智衆生開正慧眼熱惱衆生心得清涼世世所生與如來俱爾時藥王軍菩薩摩訶薩語彼年少衆生言善男子汝等今者欲得聽聞佛所説法入深義味邪汝等先當飲食飽足然後可聽如是妙法得諸義味藥王軍菩薩為諸年少衆生而説偈言汝欲聞正法當假飲食資食飽力無畏得真妙法味爾時年少衆生語藥王軍菩薩言賢者長老我不識汝汝為是誰名字何等我今觀汝色相具足威儀間雅諸根寂靜遠離怖畏七寶嚴身如功德聚云何于今發此語言教我飲食然後聽法爾時年少衆生復説偈言惟賢者長老善調伏諸根必有大名稱一切皆愛樂已圓滿善法無不證知者云何教我言飲食資身命如我所知見飲食為過因食已於腹中成種種雜穢設復增色相惡法亦隨生當於惡道中常受大怖畏衆生造罪業皆從飲食生飲食為因緣滋生種種欲營求大田園舍宅樓閣等真珠寶瓔珞殊妙嚴身具象馬及車乘奴婢亦無數如是大富貴我實不愛樂富貴不長久皆是無常法假使四大洲為彼轉輪王七寶皆圓滿具足有千子輪王大富貴我亦不愛樂雖有世神通終歸如是處四王忉利天夜摩及兜率化樂他變化摩囉大天王光潔有神用自在力莊嚴欲天大福樂我亦不愛樂五衰相現時亦是無常法初定中間禪乃至色究竟無色無別處非想非非想修定以猒欣隨應離世縛雖有大福壽我亦不愛樂極經八万劫終是無常法諦聽大尊者我等所知見唯有佛如來真是歸依處佛如日月光普照諸冥暗輪回三有苦斷滅令不生為諸羣生類宣説微妙法令住不退轉證於無上道故我嗜佛法甚於飲與食尊者雖憐愍殊非我本意爾時年少衆生重復恭敬藥王軍菩薩摩訶薩已而告之言尊者大士汝名何等我願得聞唯願慈悲示我令知爾時年少衆生而説偈言善哉大尊者具足慈悲行衆生皆樂見故我恭敬禮汝名字何等惟願為我説若得聞隨喜頂戴常受持爾時藥王軍菩薩摩訶薩語年少衆生言汝等今者欲聞我名當自觀察合掌審聽藥王軍菩薩而説偈言汝欲聞我名我名不可得汝欲須知者如空中捕影時年少衆生一心頂禮藥王軍菩薩白言尊者尊者名字功德微妙祕密甚深惟願尊者憐愍我故表示令知爾時年少衆生重説偈言我觀一切法名字悉空無願示生死人甚深微妙義爾時藥王軍菩薩為諸年少衆生表宣名字而説偈言年少汝諦聽我今説自名應生清淨心當獲大法利我以衆生類種種病所纏善巧處妙方廣施救濟法藥美如甘露袪病速如神由此立假名名為藥王軍貪欲病最大惱害世衆生此病為因緣滋生諸苦惱授以無常藥袪病速如神由此立假名名為藥王軍瞋病熱如火焚燒寂靜心忿恨惱恚害展轉互相生授以慈悲藥袪病速如神由此立假名名為藥王軍愚癡病可怖覆沒智慧心流轉惡趣中不得聞正法授以方便藥袪病速如神由此立假名名為藥王軍由斯三種病展轉諸病生已經無數劫未遇解脫因諸佛出於世是為天人師慈念諸衆生如親愛己子現大神通力廣開正法門愚癡顛倒者迷謬不能入我以方便力隨佛出世間觀察病本因處料救濟法應病授良藥服者得痊除年少汝應識我名藥王軍爾時年少衆生聞是藥王軍菩薩説自名已歡喜踊躍得未曾有即起合掌瞻仰頂禮而伸讚歎復説偈言菩薩藥王軍救世大悲者精進利羣生長時無懈倦念彼輪回苦速若救頭然我以志誠心稽首歸命禮爾時藥王軍菩薩摩訶薩告彼年少衆生言善男子我娑婆世界有佛世尊名釋迦牟尼如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊能以大慧教菩薩法攝化衆生汝等應往親近禮拜令汝速聞無上妙法藥王軍菩薩為諸年少衆生而説偈言年少汝當知佛德無有上世間出世間福智皆圓滿具相三十二八十隨形好常以大智悲救度諸含識神通力無畏高顯若須智慧不可窮淵深如大海善巧設方便隨順化衆生瞻禮歸依者皆得安樂果爾時年少衆生復白藥王軍菩薩言仁者慈悲憐愍我故授我法藥令我飲服解脫衆苦得安樂住然今我等不見釋迦如來三十二相八十種好云何得度藥王軍菩薩語年少衆生言汝觀上方有何等相諸人聞已即觀上方見三千臺從空而下七寶莊嚴寶珠羅網以覆其上出衆妙香光明豔赫年少衆生問藥王軍菩薩言仁者此諸寶臺微妙花座是何等相藥王軍言此是汝等所坐之座若坐此座速至佛所瞻禮如來則能疾得甘露妙法年少衆生白言仁者我等不知如來所住之處亦不知彼所行之路當詣何方禮覲如來藥王軍菩薩言善男子如來尊德如須山如來智慧深如大海不希供養不樂禮敬雖有惡魔來侵不共諍論若能歸依佛者則得不入死門得法總持門十方諸大菩薩欲見如來以自智力種種觀察尚不能見況汝等邪善男子如來如空中塵無有住處汝等若能以清淨心勿有希願但行禮拜即見如來爾時年少衆生受教升座適坐華座即見如來身真金色如大金山三十二相八十隨好以自莊嚴威德特尊衆善具足在大衆中坐大蓮華寶師子座是諸年少衆生歡喜踊躍即起合掌一心頂禮瞻仰尊顏目不暫捨爾時世尊出迦陵頻伽之音讚言童子善哉善哉汝等能以清淨智願勇猛精進來此娑婆世界禮拜親近我釋迦牟尼世尊應正等覺爾時世尊熙怡微笑從其面門出八万四千種種色光所謂青黃赤白紅紫縹色頗胝迦色遍照三千大千世界上至阿迦尼吒天下及諸惡地獄遇斯光照衆生皆獲一切利益安樂其光照已還至佛所繞佛七匝從佛頂入爾時藥王軍菩薩從座而起合掌向佛白言世尊如來所為甚深稀有必無虛設今日微笑笑必有因惟願慈悲為我開説佛告藥王軍汝今能於大衆之中作大師子吼問於如來如此稀有微妙大事汝今諦聽為汝解説善男子汝今見此三千七寶大華座不藥王軍言唯然已見佛言善男子今此華座是諸年少衆生得坐此座即獲圓滿一切善根證得一切善法樂住登于十地乃至當得阿耨多羅三藐三菩提建大法幢擊大法鼓無量天人聞是法已悉獲利益無量地獄衆生仗是法力解脫苦報得安樂處是時會中有九十酤胝諸老衆生得須陀洹果佛告藥王軍汝且觀是四方上下諸大菩薩爾時藥王軍菩薩即觀四方見東方界五十酤胝殑伽沙菩薩而來向此南方界六十酤胝殑伽沙菩薩而來向此西方界七十酤胝殑伽沙菩薩而來向此北方界八十酤胝殑伽沙菩薩而來向此下方界九十酤胝殑伽沙菩薩而來向此上方界百酤胝殑伽沙菩薩而來向此是諸大菩薩衆到此會中恭敬供養歡喜讚歎頭面禮世尊足繞佛三匝各住一面藥王軍菩薩白佛言世尊我今見是四方上下諸大菩薩來此會中今虛空中忽然見有黑色黃色種種相現復是何緣願佛開説佛告藥王軍此是惡魔及諸眷屬欲來至此為諸年少衆生受是位故欲作障難破壞是事故來至此藥王軍汝適見是四方上下無數諸大菩薩種種色相種種形貌種種威力者故來擁護年少衆生令其惡魔及諸眷屬無能得便是惡魔衆亦皆隨喜慚愧而退佛説是經已一切勇猛菩薩藥王軍菩薩諸大菩薩等一切老衆生年少衆生與無量天人龍神一切大衆皆大歡喜信受奉行禮佛而退
